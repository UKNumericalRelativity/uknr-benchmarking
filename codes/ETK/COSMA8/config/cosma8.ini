
[cosma8]

# This machine description file is used internally by simfactory as a template
# during the sim setup and sim setup-silent commands
# Edit at your own risk
# Machine description
nickname        = cosma8
name            = COSmology MAchine 8
location        = Durham University
description     = DiRAC COSMA8 system hosted at Durham University
status          = production

# Access to this machine
hostname        = login8.cosma.dur.ac.uk
aliaspattern    = ^login8[a,b]\.pri\.cosma\.local$

# the configure scripts strip /usr/local from XXX_DIR to avoid chosing system
# libraries, however not all compilers will search in there by default Here we
# explicitly add the filtered out locations so that they appear last in the
# search path removed by strip-libdirs.sh
# removed by strip-incdirs.sh
envsetup = <<EOF
module purge
module load intel_comp/2025.3.0
module load compiler-rt/latest
module load tbb/latest
module load umf/latest
module load compiler/latest
module load mpi/latest
module load mkl/latest
module load parallel_hdf5/1.14.4
module load gsl/2.8
module load hwloc/2.11.1
module load papi/7.0.1
unset __INTEL_POST_CFLAGS
unset __INTEL_POST_FFLAGS
EOF


# Source tree management
sourcebasedir   = /cosma/apps/@ALLOCATION@/@USER@/ETK
optionlist      = cosma8.cfg
submitscript    = cosma8.sub
runscript       = cosma8.run
makejobs        = 8
make            = make -j@MAKEJOBS@
basedir         = /cosma8/data/@ALLOCATION@/@USER@/ETK
ppn             = 128
max-num-threads = 128
num-threads     = 4
nodes           = 528
; allocation      = NO_ALLOCATION
queue           = cosma8
maxwalltime     = 72:00:00
submit          = sbatch @SCRIPTFILE@ && sleep 5
getstatus       = squeue -j @JOB_ID@
stop            = scancel @JOB_ID@
submitpattern   = Submitted batch job ([0-9]+)
statuspattern   = '@JOB_ID@ '
queuedpattern   = ' PD '
runningpattern  = ' (CF|CG|R|TO) '
holdingpattern  = '\(JobHeldUser\)'
exechost        = hostname
exechostpattern = ^(\S+)
stdout          = cat @SIMULATION_NAME@.out
stderr          = cat @SIMULATION_NAME@.err
stdout-follow   = tail -n 100 -f @SIMULATION_NAME@.out @SIMULATION_NAME@.err
